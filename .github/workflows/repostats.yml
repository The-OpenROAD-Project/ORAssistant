name: Run Repo stats

on: 
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  j1:
    name: repostats-for-nice-project
    runs-on: ubuntu-latest
    steps:
      - name: run-ghrs
        uses: jgehrcke/github-repo-stats@306db38ad131cab2aa5f2cd3062bf6f8aa78c1aa  # v1.4.2
        with:
          databranch: repo-stats
          ghtoken: ${{ secrets.GH_PAT }}

